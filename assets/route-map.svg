<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc"><title id="title">Ruta por los Dolomitas</title><desc id="desc">Venecia, Cortina, Tre Cime, Cinque Torri, Ortisei, Seceda, Santa Maddalena, Lago di Carezza y regreso.</desc><rect width="1100" height="620" rx="28" fill="#eef5f0"/><path d="M0 470Q180 330 330 420T620 390T1100 330V620H0Z" fill="#dcebe2"/><path d="M0 525Q180 400 360 475T720 445T1100 400V620H0Z" fill="#cfe2d6"/><polyline points="90,480 255,310 360,250 475,300 560,330 690,220 785,175 885,310 1010,470" fill="none" stroke="#d7a54b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/><polyline points="90,480 255,310 360,250 475,300 560,330 690,220 785,175 885,310 1010,470" fill="none" stroke="#173d31" stroke-width="4" stroke-dasharray="11 10" stroke-linecap="round" stroke-linejoin="round"/><g font-family="Arial,sans-serif" fill="#17221d"><text x="42" y="55" font-size="30" font-weight="700">Ruta del viaje</text><text x="42" y="84" font-size="17" fill="#68726c">Venecia → Dolomitas orientales → Dolomitas occidentales → Venecia</text></g><g font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#17221d"><g transform="translate(90 480)"><circle r="12" fill="#173d31"/><text x="18" y="5">Venecia</text></g><g transform="translate(255 310)"><circle r="11" fill="#245742"/><text x="18" y="5">Cortina</text></g><g transform="translate(360 250)"><circle r="9" fill="#fff" stroke="#245742" stroke-width="4"/><text x="18" y="-10">Braies · Tre Cime</text></g><g transform="translate(475 300)"><circle r="9" fill="#fff" stroke="#245742" stroke-width="4"/><text x="18" y="-10">Cinque Torri</text></g><g transform="translate(560 330)"><circle r="9" fill="#fff" stroke="#245742" stroke-width="4"/><text x="18" y="24">Falzarego · Giau</text></g><g transform="translate(690 220)"><circle r="11" fill="#245742"/><text x="18" y="5">Ortisei</text></g><g transform="translate(785 175)"><circle r="9" fill="#fff" stroke="#245742" stroke-width="4"/><text x="18" y="-10">Seceda · Alpe di Siusi</text></g><g transform="translate(885 310)"><circle r="9" fill="#fff" stroke="#245742" stroke-width="4"/><text x="18" y="-10">Santa Maddalena</text></g><g transform="translate(1010 470)"><circle r="12" fill="#173d31"/><text x="-155" y="-18">Lago di Carezza</text></g></g></svg>